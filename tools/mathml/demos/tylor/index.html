<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Формула Тейлора — MathML — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark;
      font-size: 16px;
    }

    body {
      min-height: 100vh;
      padding: 2rem;

      display: grid;
      place-items: center;

      background: #18191C;
      color: #fff;

      font-family: Roboto, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;

      align-items: center;
    }

    h3 {
      font-weight: 500;
      text-align: center;
    }

    math {
      font-size: 1.5rem;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Формула Тейлора</h3>

    <math display="block">
      <mi>f</mi>
      <mo>(</mo><mi>x</mi><mo>)</mo>
      <mo>=</mo>
      <munderover>
        <mo>∑</mo>
        <mrow>
          <mi>n</mi>
          <mo>=</mo>
          <mn>0</mn>
        </mrow>
        <mo>∞</mo>
      </munderover>
      <mfrac>
        <mrow>
          <msup>
            <mi>f</mi>
            <mrow>
              <mo>(</mo>
              <mi>n</mi>
              <mo>)</mo>
            </mrow>
          </msup>
          <mo>(</mo>
          <mi>a</mi>
          <mo>)</mo>
        </mrow>
        <mrow>
          <mi>n</mi>
          <mo>!</mo>
        </mrow>
      </mfrac>
      <msup>
        <mrow>
          <mo>(</mo>
          <mi>x</mi>
          <mo>-</mo>
          <mi>a</mi>
          <mo>)</mo>
        </mrow>
        <mi>n</mi>
      </msup>
    </math>
  </div>
</body>
</html>
