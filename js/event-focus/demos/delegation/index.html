<!DOCTYPE html>
<html lang="ru">

<head>
  <title>Пример делегирования focus — focus — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
      font-size: 18px;
    }

    body {
      min-height: 100vh;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 50px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 50px;
    }

    h2 {
      width: 320px;
      font-weight: 500;
      font-size: 1.375rem;
      padding-block-end: 19px;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: 500;
    }

    input {
      width: 350px;
      flex-shrink: 0;
      border: 1px solid #ffffff;
      border-radius: 6px;
      padding: 10px 15px;
      background-color: transparent;
      color: #ffffff;
      font-family: inherit;
      font-size: inherit;
      font-weight: 300;
    }

    input:focus {
      border-color: #FFD829;
      background-color: transparent;
      outline: none;
    }

    .logs {
      margin-top: 30px;
      padding: 10px;
      border-top: 2px dashed #ffffff;
      min-height: 200px;
    }

    .logs ol {
      list-style: none;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      .container {
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .row {
        gap: 20px;
      }

      h2 {
        width: 100%;
      }

      .column,
      form,
      .form-row,
      input {
        width: 100%;
      }

      .logs {
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="row">
      <h2>⛔ Делегирование не работает</h2>
      <form class="form" id="form1">
        <div class="form-row">
          <label for="name1">Введите имя:</label>
          <input id="name1" type="text">
        </div>
        <div class="form-row">
          <label for="city1">Введите город:</label>
          <input id="city1" type="text">
        </div>
      </form>
    </div>
    <div class="row">
      <h2>✅ Делегирование работает</h2>
      <form class="form" id="form2">
        <div class="form-row">
          <label for="name2">Введите имя:</label>
          <input id="name2" type="text">
        </div>
        <div class="form-row">
          <label for="city2">Введите город:</label>
          <input id="city2" type="text">
        </div>
      </form>
    </div>
  </div>
  <div class="logs">
    <h2>📝 Последние 5 событий:</h2>
    <ol reversed id="logs"></ol>
  </div>
  <script>
    const form1 = document.getElementById("form1");
    const form2 = document.getElementById("form2");
    const logs = document.getElementById('logs');
    const logEntries = [];

    function focusHandler(event) {
      const input = event.target;

      if (input.id) {
        const timestamp = new Date().toLocaleTimeString();
        const message = `${timestamp}: фокус на ${input.id}`;

        logEntries.unshift(message);

        if (logEntries.length > 5) {
          logEntries.pop();
        }

        logs.innerHTML = logEntries.map((entry, index) =>
          `<li>${entry}</li>`
        ).join("");
      }
    }

    form1.addEventListener('focus', focusHandler);
    form2.addEventListener('focus', focusHandler, { capture: true });
  </script>
</body>

</html>
