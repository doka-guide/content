<!DOCTYPE html>
<html lang="ru">

<head>
  <title>История поиска с помощью focus — focus — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
      font-size: 20px;
    }

    body {
      min-height: 100vh;
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    form {
      width: 500px;
      margin: auto;
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .row-label {
      margin-right: 55px;
      font-size: 30px;
      font-weight: 500;
      line-height: 1;
    }

    .input {
      width: 100%;
      border: 1px solid #ffffff;
      border-radius: 6px;
      padding: 10px 15px;
      background-color: transparent;
      color: #ffffff;
      font-family: inherit;
      font-size: inherit;
      font-weight: 300;
    }

    .input:focus {
      border-color: #FFD829;
      background-color: transparent;
      outline: none;
    }

    .container {
      width: 350px;
      flex-shrink: 0;
      position: relative;
    }

    ul.recentSearches {
      position: absolute;
      width: 100%;
      margin-top: 15px;
      padding: 5px;
      list-style: none;
      border: 1px solid #ffffff;
      border-radius: 6px;

      opacity: 0;
      transform: translateY(-10px);
      visibility: hidden;
      transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
    }

    ul.show {
      opacity: 1;
      transform: translateY(0);
      visibility: visible;
    }

    li {
      cursor: pointer;
    }

    li:hover {
      color: #FFD829;
    }

    @media (max-width: 768px) {
      body {
        padding: 30px;
      }

      .form-row {
        display: block;
      }

      .row-label {
        margin-right: 0;
      }

      .container {
        width: 100%;
        margin-top: 25px;
      }
    }
  </style>
</head>

<body>
  <form class="form">
    <div class="form-row">
      <label for="name" class="row-label">Поиск:</label>
      <div class="container">
        <input id="search" class="input" type="text" placeholder="Введите поисковый запрос">
        <ul id="recentSearches" class="recentSearches">
          <li>🔍 javascript</li>
          <li>🔍 html css</li>
          <li>🔍 react</li>
        </ul>
      </div>
    </div>
  </form>
  <script>
    const input = document.getElementById("search");
    const recentDiv = document.getElementById('recentSearches');

    input.addEventListener('focus', () => {
      recentDiv.classList.add('show');
    })

    input.addEventListener('blur', () => {
      recentDiv.classList.remove('show');
    })
  </script>
</body>

</html>
