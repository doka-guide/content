<!DOCTYPE html>
<html lang="ru">
<head>
  <title>currentColor — color — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .parent {
      color: #2E9AFF;
      padding: 20px 0;
      border-top: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
    }

    .child {
      background: currentColor;
      height: 110px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="parent">
    Мы сделали этот текст голубым с помощью свойства «color». Рамки блока наследуют цвет от текста.
    <div class="child"></div>
    Блок выше 👆 тоже наследует фоновый цвет от текста, для которого задано свойство «color».
  </div>
</body>
</html>
