<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Текст с градиентным фоном — background-clip — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    /* === стили демо === */

    .demo {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .gradient-text {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 500;
      background-image: linear-gradient(to right, #2E9AFF, #F498AD);
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }

    .plain-text {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 500;
      color: #FFFFFF;
      line-height: 1.2;
    }

    .caption {
      font-size: 13px;
      color: rgb(255 255 255 / 0.5);
      font-style: italic;
    }

    .demo-logo {
      display: none;
      position: fixed;
      top: 12px;
      left: 16px;
      color: #FFFFFF;
      font-size: 13px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .demo-logo:hover {
      opacity: 1;
    }

    .demo-meta {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      border-top: 2px solid #2E9AFF;
      background-color: #18191C;
      font-size: 13px;
      font-style: italic;
      justify-content: space-between;
      align-items: center;
    }

    .demo-meta a {
      color: inherit;
      text-decoration-color: #2E9AFF;
      text-decoration-thickness: 2px;
    }

    @media (width <= 768px) {
      body {
        padding: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="demo">
    <div>
      <p class="gradient-text">Заголовок</p>
      <p class="caption">background-clip: text</p>
    </div>
    <div>
      <p class="plain-text">Заголовок</p>
      <p class="caption">без background-clip</p>
    </div>
  </div>

  <a class="demo-logo" href="https://doka.guide/">U•ᴥ•U Дока</a>

  <footer class="demo-meta">
    <a href="https://doka.guide/css/background-clip/">background-clip — Дока</a>
    <a href="https://doka.guide/people/solarrust/">Алёна Батицкая</a>
  </footer>

  <script>
    if (!new URLSearchParams(window.location.search).has('embed')) {
      document.querySelector('.demo-meta').style.display = 'flex';
      document.querySelector('.demo-logo').style.display = 'block';
    }
  </script>
</body>
</html>
