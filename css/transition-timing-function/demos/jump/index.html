<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Демонстрация разных значений jump — transition-timing-function — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
      --duration: 2s;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .page {
      height: 100vh;
      overflow-y: scroll;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    h3 {
      font-weight: 500;
      font-size: 18px;
      text-align: center;
    }

    .controls {
      position: sticky;
      top: -40px;
      z-index: 1;
      width: 100%;
      padding: 12px 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      background-color: #18191C;
      box-shadow: 0 12px 16px -8px rgb(0 0 0 / 60%);
    }

    button {
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      background-color: #2E9AFF;
      color: #000000;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: scale(1.04);
    }

    button:focus-visible {
      outline: 2px solid #FFFFFF;
      outline-offset: 2px;
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 640px;
    }

    .row {
      display: grid;
      grid-template-columns: 140px 1fr;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      background-color: #282A2E;
      cursor: pointer;
    }

    .row .name {
      font-family: monospace;
      font-size: 14px;
    }

    .track {
      position: relative;
      height: 34px;
      border-radius: 8px;
      background-color: #18191C;
      overflow: hidden;
    }

    .ticks {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
    }

    .ticks span {
      border-right: 1px dashed #3A3D44;
    }

    .ticks span:last-child {
      border-right: none;
    }

    .fill {
      position: absolute;
      inset-block: 0;
      inset-inline-start: 0;
      width: 0;
      background-color: #2E9AFF;
      transition-property: width;
      transition-duration: var(--duration);
    }

    .row.is-active .fill {
      width: 100%;
    }

    .jump-start .fill { transition-timing-function: steps(5, jump-start); }
    .jump-end .fill { transition-timing-function: steps(5, jump-end); }
    .jump-none .fill { transition-timing-function: steps(5, jump-none); }
    .jump-both .fill { transition-timing-function: steps(5, jump-both); }

    @media (width <= 480px) {
      .page {
        padding: 30px 16px;
      }

      .controls {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <div class="page">

    <h3>Нажми на строку, чтобы запустить переход</h3>

    <div class="controls">
      <button type="button" id="run-all">Запустить всё</button>
      <button type="button" id="reset-all">Сбросить всё</button>
    </div>

    <div class="rows" id="rows">
      <div class="row jump-start">
        <span class="name">jump-start</span>
        <div class="track">
          <div class="ticks"><span></span><span></span><span></span><span></span><span></span></div>
          <div class="fill"></div>
        </div>
      </div>

      <div class="row jump-end">
        <span class="name">jump-end</span>
        <div class="track">
          <div class="ticks"><span></span><span></span><span></span><span></span><span></span></div>
          <div class="fill"></div>
        </div>
      </div>

      <div class="row jump-none">
        <span class="name">jump-none</span>
        <div class="track">
          <div class="ticks"><span></span><span></span><span></span><span></span><span></span></div>
          <div class="fill"></div>
        </div>
      </div>

      <div class="row jump-both">
        <span class="name">jump-both</span>
        <div class="track">
          <div class="ticks"><span></span><span></span><span></span><span></span><span></span></div>
          <div class="fill"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    var rows = document.querySelectorAll('.row');
    var fills = document.querySelectorAll('.fill');

    rows.forEach(function (row) {
      row.addEventListener('click', function () {
        row.classList.toggle('is-active');
      });
    });

    document.getElementById('run-all').addEventListener('click', function () {
      rows.forEach(function (row) {
        row.classList.add('is-active');
      });
    });

    document.getElementById('reset-all').addEventListener('click', function () {
      fills.forEach(function (fill) {
        fill.style.transitionDuration = '0s';
      });
      rows.forEach(function (row) {
        row.classList.remove('is-active');
      });
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          fills.forEach(function (fill) {
            fill.style.transitionDuration = '';
          });
        });
      });
    });
  </script>
</body>
</html>
