<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Демонстрация разных временных функций — transition-timing-function — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
      --duration: 1.8s;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .page {
      height: 100vh;
      overflow-y: scroll;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .controls {
      position: sticky;
      top: -40px;
      z-index: 1;
      width: 100%;
      padding: 12px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background-color: #18191C;
      box-shadow: 0 12px 16px -8px rgb(0 0 0 / 60%);
    }

    button {
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      background-color: #2E9AFF;
      color: #000000;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: scale(1.04);
    }

    button:focus-visible {
      outline: 2px solid #FFFFFF;
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-radius: 10px;
      background-color: #282A2E;
    }

    .item svg {
      width: 100%;
      height: auto;
      aspect-ratio: 1.4;
    }

    .unit-box {
      fill: rgb(46 154 255 / 8%);
      stroke: #2E9AFF;
      stroke-width: 1;
      stroke-dasharray: 3 3;
    }

    .reference-line {
      stroke: #545861;
      stroke-width: 1;
      stroke-dasharray: 2 2;
    }

    .curve {
      fill: none;
      stroke: #F498AD;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .track {
      position: relative;
      width: 100%;
      height: 14px;
      background-color: #18191C;
      border-radius: 7px;
    }

    .track i {
      position: absolute;
      top: 50%;
      left: 0;
      width: 10px;
      height: 10px;
      margin-top: -5px;
      border-radius: 50%;
      background-color: #F498AD;
      transition-property: left;
      transition-duration: var(--duration);
    }

    .grid.is-active .track i {
      left: calc(100% - 10px);
    }

    .label {
      text-align: center;
      font-family: monospace;
      font-size: 12px;
      opacity: 0.9;
      word-break: break-word;
    }

    @media (width <= 480px) {
      .page {
        padding: 30px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="controls">
      <button type="button" id="toggle">Запустить</button>
    </div>

    <div class="grid" id="grid">

      <div class="item">
        <svg viewBox="0 0 60 60">
          <rect class="unit-box" x="0" y="16" width="60" height="20"></rect>
          <line class="reference-line" x1="0" y1="36" x2="60" y2="16"></line>
          <path class="curve" d="M0,36 L60,16"></path>
        </svg>
        <div class="track"><i style="transition-timing-function: linear"></i></div>
        <span class="label">linear</span>
      </div>

      <div class="item">
        <svg viewBox="0 0 60 60">
          <rect class="unit-box" x="0" y="16" width="60" height="20"></rect>
          <line class="reference-line" x1="0" y1="36" x2="60" y2="16"></line>
          <polyline class="curve" points="0,36 15,26 30,21 45,19 60,16"></polyline>
        </svg>
        <div class="track"><i style="transition-timing-function: linear(0, 0.5, 0.75, 0.85, 1)"></i></div>
        <span class="label">linear(0, 0.5, 0.75, 0.85, 1)</span>
      </div>

      <div class="item">
        <svg viewBox="0 0 60 60">
          <rect class="unit-box" x="0" y="16" width="60" height="20"></rect>
          <line class="reference-line" x1="0" y1="36" x2="60" y2="16"></line>
          <path class="curve" d="M0,36 C15,34 15,16 60,16"></path>
        </svg>
        <div class="track"><i style="transition-timing-function: ease"></i></div>
        <span class="label">ease</span>
      </div>

      <div class="item">
        <svg viewBox="0 0 60 60">
          <rect class="unit-box" x="0" y="16" width="60" height="20"></rect>
          <line class="reference-line" x1="0" y1="36" x2="60" y2="16"></line>
          <path class="curve" d="M0,36 C25.2,36 60,16 60,16"></path>
        </svg>
        <div class="track"><i style="transition-timing-function: ease-in"></i></div>
        <span class="label">ease-in</span>
      </div>

      <div class="item">
        <svg viewBox="0 0 60 60">
          <rect class="unit-box" x="0" y="16" width="60" height="20"></rect>
          <line class="reference-line" x1="0" y1="36" x2="60" y2="16"></line>
          <path class="curve" d="M0,36 C0,36 34.8,16 60,16"></path>
        </svg>
        <div class="track"><i style="transition-timing-function: ease-out"></i></div>
        <span class="label">ease-out</span>
      </div>

      <div class="item">
        <svg viewBox="0 0 60 60">
          <rect class="unit-box" x="0" y="16" width="60" height="20"></rect>
          <line class="reference-line" x1="0" y1="36" x2="60" y2="16"></line>
          <path class="curve" d="M0,36 C25.2,36 34.8,16 60,16"></path>
        </svg>
        <div class="track"><i style="transition-timing-function: ease-in-out"></i></div>
        <span class="label">ease-in-out</span>
      </div>

      <div class="item">
        <svg viewBox="0 0 60 60">
          <rect class="unit-box" x="0" y="16" width="60" height="20"></rect>
          <line class="reference-line" x1="0" y1="36" x2="60" y2="16"></line>
          <path class="curve" d="M0,36 C20.4,4.8 38.4,16 60,16"></path>
        </svg>
        <div class="track"><i style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1)"></i></div>
        <span class="label">cubic-bezier(0.34, 1.56, 0.64, 1)</span>
      </div>

    </div>

  </div>

  <script>
    var button = document.getElementById('toggle');
    var grid = document.getElementById('grid');
    var dots = grid.querySelectorAll('.track i');
    var isActive = false;

    button.addEventListener('click', function () {
      if (!isActive) {
        grid.classList.add('is-active');
        button.textContent = 'Сбросить';
        isActive = true;
        return;
      }

      // Мгновенно возвращаем точки в начало без перехода, затем возвращаем transition
      dots.forEach(function (dot) {
        dot.style.transitionDuration = '0s';
      });
      grid.classList.remove('is-active');

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          dots.forEach(function (dot) {
            dot.style.transitionDuration = '';
          });
        });
      });

      button.textContent = 'Запустить';
      isActive = false;
    });
  </script>
</body>
</html>
