<!DOCTYPE html>
<html lang="ru">
<head>
  <title>cubic-bezier — transition-timing-function — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 24px;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      background-color: #2E9AFF;
      color: #000000;
      font-size: 22px;
      font-weight: 500;
      font-family: inherit;
      box-shadow: 0 0 0 0 rgb(46 154 255 / 40%);
      transition-property: padding, transform, box-shadow;
      transition-duration: 0.6s;
      transition-timing-function: cubic-bezier(0.52, 0, 0.27, 2);
    }

    button:hover, button:focus-visible {
      padding: 22px 42px;
      transform: scale(1.05);
      box-shadow: 0 0 0 10px rgb(46 154 255 / 0%);
      cursor: pointer;
      outline: none;
    }

    .caption {
      font-family: monospace;
      font-size: 14px;
      color: #B7B9BE;
      text-align: center;
    }

    @media (width <= 480px) {
      body {
        padding: 30px 16px;
      }
    }
  </style>
</head>
<body>
  <button type="button">Наведи на меня</button>
  <span class="caption">transition-timing-function: cubic-bezier(0.52, 0, 0.27, 2)</span>
</body>
</html>
