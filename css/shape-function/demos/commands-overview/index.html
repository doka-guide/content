<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Команды shape() — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px;
    }

    .title {
      color: #ffffff;
      font-family: system-ui, sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
    }

    .commands-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      max-width: 1200px;
      width: 100%;
    }

    @media (min-width: 400px) {
      .commands-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 768px) {
      .commands-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .command-card {
      background: #2a2a4a;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 160px;
    }

    .command-name {
      font-family: monospace;
      font-size: clamp(13px, 3vw, 16px);
      font-weight: bold;
      text-align: center;
    }

    .command-visual {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 80px;
    }

    .command-visual svg {
      width: 100%;
      height: auto;
      max-width: 140px;
    }

    .command-description {
      font-family: system-ui, sans-serif;
      font-size: clamp(14px, 2.5vw, 16px);
      color: #888;
      text-align: center;
    }

    /* Цвета для разных команд */
    .line .command-name { color: #667eea; }
    .curve .command-name { color: #764ba2; }
    .arc .command-name { color: #4ecdc4; }
    .close .command-name { color: #f093fb; }
    .hline-vline .command-name { color: #38ef7d; }
    .smooth .command-name { color: #f5576c; }
    .from .command-name { color: #ffd200; }
    .by .command-name { color: #00c9ff; }
  </style>
</head>
<body>
  <h1 class="title">Команды shape()</h1>
  
  <div class="commands-grid">
    <!-- Line -->
    <div class="command-card line">
      <div class="command-name">line</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <line x1="20" y1="20" x2="100" y2="60" stroke="#667eea" stroke-width="3"/>
          <circle cx="20" cy="20" r="4" fill="#ffffff"/>
          <circle cx="100" cy="60" r="4" fill="#ffffff"/>
        </svg>
      </div>
      <div class="command-description">Прямая линия</div>
    </div>

    <!-- Curve -->
    <div class="command-card curve">
      <div class="command-name">curve</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <path d="M 20 70 Q 60 10 100 70" stroke="#764ba2" stroke-width="3" fill="none"/>
          <circle cx="20" cy="70" r="4" fill="#ffffff"/>
          <circle cx="100" cy="70" r="4" fill="#ffffff"/>
          <circle cx="60" cy="10" r="3" fill="#ff6b6b" opacity="0.7"/>
          <line x1="20" y1="70" x2="60" y2="10" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3"/>
          <line x1="60" y1="10" x2="100" y2="70" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3"/>
        </svg>
      </div>
      <div class="command-description">Кривая Безье</div>
    </div>

    <!-- Arc -->
    <div class="command-card arc">
      <div class="command-name">arc</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <path d="M 20 50 A 40 30 0 0 1 100 50" stroke="#4ecdc4" stroke-width="3" fill="none"/>
          <circle cx="20" cy="50" r="4" fill="#ffffff"/>
          <circle cx="100" cy="50" r="4" fill="#ffffff"/>
        </svg>
      </div>
      <div class="command-description">Дуга эллипса</div>
    </div>

    <!-- Close -->
    <div class="command-card close">
      <div class="command-name">close</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <polygon points="60,15 100,65 20,65" stroke="#f093fb" stroke-width="3" fill="none"/>
          <circle cx="60" cy="15" r="4" fill="#ffffff"/>
          <circle cx="100" cy="65" r="4" fill="#ffffff"/>
          <circle cx="20" cy="65" r="4" fill="#ffffff"/>
        </svg>
      </div>
      <div class="command-description">Замыкание пути</div>
    </div>

    <!-- hline/vline -->
    <div class="command-card hline-vline">
      <div class="command-name">hline / vline</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <line x1="20" y1="30" x2="100" y2="30" stroke="#38ef7d" stroke-width="3"/>
          <line x1="100" y1="30" x2="100" y2="60" stroke="#11998e" stroke-width="3"/>
          <circle cx="20" cy="30" r="4" fill="#ffffff"/>
          <circle cx="100" cy="30" r="4" fill="#ffffff"/>
          <circle cx="100" cy="60" r="4" fill="#ffffff"/>
        </svg>
      </div>
      <div class="command-description">Горизонт./вертик.</div>
    </div>

    <!-- Smooth -->
    <div class="command-card smooth">
      <div class="command-name">smooth</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <path d="M 10 50 Q 25 20 40 50 T 70 50 T 100 50" stroke="#f5576c" stroke-width="3" fill="none"/>
          <circle cx="10" cy="50" r="3" fill="#ffffff"/>
          <circle cx="40" cy="50" r="3" fill="#ffffff"/>
          <circle cx="70" cy="50" r="3" fill="#ffffff"/>
          <circle cx="100" cy="50" r="3" fill="#ffffff"/>
        </svg>
      </div>
      <div class="command-description">Плавная кривая</div>
    </div>

    <!-- from -->
    <div class="command-card from">
      <div class="command-name">from</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <circle cx="60" cy="40" r="12" fill="none" stroke="#ffd200" stroke-width="3"/>
          <circle cx="60" cy="40" r="4" fill="#ffd200"/>
          <text x="60" y="65" text-anchor="middle" fill="#ffd200" font-family="system-ui" font-size="11" font-weight="bold">START</text>
        </svg>
      </div>
      <div class="command-description">Начальная точка</div>
    </div>

    <!-- by -->
    <div class="command-card by">
      <div class="command-name">by (относит.)</div>
      <div class="command-visual">
        <svg viewBox="0 0 120 80">
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
              <path d="M0,0 L0,6 L7,3 z" fill="#00c9ff"/>
            </marker>
          </defs>
          <line x1="30" y1="40" x2="90" y2="40" stroke="#00c9ff" stroke-width="3" marker-end="url(#arrow)"/>
          <text x="60" y="30" text-anchor="middle" fill="#00c9ff" font-family="monospace" font-size="10">+100px</text>
          <circle cx="30" cy="40" r="4" fill="#ffffff"/>
        </svg>
      </div>
      <div class="command-description">Относит. координаты</div>
    </div>
  </div>
</body>
</html>
