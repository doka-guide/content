<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Оптическое масштабирование — font-optical-sizing — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 36px 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .demo {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 640px;
    }

    /* ---- Образцы ---- */
    .showcase {
      background-color: #282A2E;
      border-radius: 8px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sample {
      font-family: "Source Serif 4", serif;
      font-optical-sizing: none;
      color: rgb(255 255 255 / 0.9);
      line-height: 1.2;
      transition: font-variation-settings 0.05s linear;
    }

    .s-sm { font-size: 12px; }
    .s-md { font-size: 30px; }
    .s-lg { font-size: 58px; letter-spacing: -0.01em; }

    /* ---- Слайдер ---- */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .opsz-label {
      font-size: 11px;
      color: rgb(255 255 255 / 0.35);
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      appearance: none;
      background: linear-gradient(
        to right,
        #2E9AFF var(--pct, 0%),
        rgb(255 255 255 / 0.12) var(--pct, 0%)
      );
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      background-color: #FFFFFF;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgb(0 0 0 / 0.4);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background-color: #FFFFFF;
      border-radius: 50%;
      border: none;
      box-shadow: 0 1px 4px rgb(0 0 0 / 0.4);
    }

    /* ---- Статус ---- */
    .status {
      font-size: 11px;
      color: rgb(255 255 255 / 0.3);
      padding: 8px 12px;
      background-color: #282A2E;
      border-radius: 6px;
      line-height: 1.55;
    }

    .status strong {
      color: #2E9AFF;
      font-weight: 400;
    }

    .status em {
      font-style: normal;
      color: rgb(255 255 255 / 0.5);
    }

    @media (width <= 520px) {
      body { padding: 20px; }
      .s-lg { font-size: 40px; }
      .s-md { font-size: 22px; }
    }

    .demo-logo {
      display: none;
      position: fixed;
      top: 12px;
      left: 16px;
      color: #FFFFFF;
      font-size: 13px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .demo-logo:hover { opacity: 1; }

    .demo-meta {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      border-top: 2px solid #2E9AFF;
      background-color: #18191C;
      font-size: 13px;
      font-style: italic;
      justify-content: space-between;
      align-items: center;
    }

    .demo-meta a {
      color: inherit;
      text-decoration-color: #2E9AFF;
      text-decoration-thickness: 2px;
    }
  </style>
</head>
<body>

  <div class="demo">

    <div class="showcase">
      <p class="sample s-sm" id="t1">Optical sizing adjusts letterforms at different sizes</p>
      <p class="sample s-md" id="t2">Вариативные шрифты</p>
      <p class="sample s-lg" id="t3">Ось opsz</p>
    </div>

    <div class="controls">
      <div class="slider-row">
        <span class="opsz-label">8</span>
        <input type="range" id="slider" min="8" max="60" value="8" step="1">
        <span class="opsz-label">60</span>
      </div>

      <div class="status" id="status"></div>
    </div>

  </div>

  <a class="demo-logo" href="https://doka.guide/">U•ᴥ•U Дока</a>

  <footer class="demo-meta">
    <a href="https://doka.guide/css/font-optical-sizing/">font-optical-sizing — Дока</a>
    <a href="https://doka.guide/people/solarrust/">Алёна Батицкая</a>
  </footer>

  <script>
    if (!new URLSearchParams(window.location.search).has('embed')) {
      document.querySelector('.demo-meta').style.display = 'flex';
      document.querySelector('.demo-logo').style.display = 'block';
    }

    const slider  = document.getElementById('slider');
    const status  = document.getElementById('status');
    const samples = ['t1', 't2', 't3'].map(id => document.getElementById(id));

    const MIN = 8, MAX = 60;

    function update() {
      const opsz = Number(slider.value);
      const pct  = ((opsz - MIN) / (MAX - MIN) * 100).toFixed(1);

      // Прогресс-трек
      slider.style.setProperty('--pct', pct + '%');

      // Применяем ось opsz напрямую
      samples.forEach(el => {
        el.style.fontVariationSettings = `"opsz" ${opsz}`;
      });

      // Подсказка: что делает auto
      const autoNote = opsz <= 14
        ? `font-optical-sizing: auto при font-size ~${opsz}px выставил бы то же значение`
        : opsz >= 50
        ? `font-optical-sizing: auto при font-size ~${opsz}px выставил бы то же значение`
        : `font-optical-sizing: auto выставляет opsz = font-size автоматически`;

      status.innerHTML =
        `font-variation-settings: <strong>"opsz" ${opsz}</strong>`
        + `&nbsp;&nbsp;·&nbsp;&nbsp;<em>${autoNote}</em>`;
    }

    slider.addEventListener('input', update);
    update();
  </script>
</body>
</html>
