<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Оптическое масштабирование — font-optical-sizing — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .demo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 680px;
    }

    .column {
      background-color: #282A2E;
      border-radius: 8px;
      padding: 22px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .col-label {
      border-bottom: 1px solid rgb(255 255 255 / 0.07);
      padding-bottom: 14px;
    }

    .col-label strong {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #2E9AFF;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .col-label span {
      font-size: 10px;
      color: rgb(255 255 255 / 0.3);
    }

    /* Общие стили для всех образцов */
    .samples {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .size-tag {
      font-size: 9px;
      color: rgb(255 255 255 / 0.2);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }

    .sample {
      font-family: "Source Serif 4", serif;
      line-height: 1.15;
      color: rgb(255 255 255 / 0.88);
    }

    .s-sm { font-size: 11px; }
    .s-md { font-size: 26px; }
    .s-lg { font-size: 54px; letter-spacing: -0.01em; }

    /* auto: браузер передаёт font-size как opsz */
    .col-auto .sample {
      font-optical-sizing: auto;
    }

    /* none: opsz фиксируется на дефолтном значении шрифта */
    .col-none .sample {
      font-optical-sizing: none;
    }

    @media (width <= 540px) {
      body { padding: 16px; }
      .demo { gap: 10px; }
      .s-lg { font-size: 38px; }
      .s-md { font-size: 20px; }
    }

    .demo-logo {
      display: none;
      position: fixed;
      top: 12px;
      left: 16px;
      color: #FFFFFF;
      font-size: 13px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .demo-logo:hover { opacity: 1; }

    .demo-meta {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      border-top: 2px solid #2E9AFF;
      background-color: #18191C;
      font-size: 13px;
      font-style: italic;
      justify-content: space-between;
      align-items: center;
    }

    .demo-meta a {
      color: inherit;
      text-decoration-color: #2E9AFF;
      text-decoration-thickness: 2px;
    }
  </style>
</head>
<body>

  <div class="demo">

    <div class="column col-auto">
      <div class="col-label">
        <strong>auto</strong>
        <span>opsz = font-size</span>
      </div>
      <div class="samples">
        <div class="row">
          <span class="size-tag">11</span>
          <p class="sample s-sm">Optical sizing for text</p>
        </div>
        <div class="row">
          <span class="size-tag">26</span>
          <p class="sample s-md">Форма глифов</p>
        </div>
        <div class="row">
          <span class="size-tag">54</span>
          <p class="sample s-lg">Шрифт</p>
        </div>
      </div>
    </div>

    <div class="column col-none">
      <div class="col-label">
        <strong>none</strong>
        <span>opsz = дефолт шрифта</span>
      </div>
      <div class="samples">
        <div class="row">
          <span class="size-tag">11</span>
          <p class="sample s-sm">Optical sizing for text</p>
        </div>
        <div class="row">
          <span class="size-tag">26</span>
          <p class="sample s-md">Форма глифов</p>
        </div>
        <div class="row">
          <span class="size-tag">54</span>
          <p class="sample s-lg">Шрифт</p>
        </div>
      </div>
    </div>

  </div>

  <a class="demo-logo" href="https://doka.guide/">U•ᴥ•U Дока</a>

  <footer class="demo-meta">
    <a href="https://doka.guide/css/font-optical-sizing/">font-optical-sizing — Дока</a>
    <a href="https://doka.guide/people/solarrust/">Алёна Батицкая</a>
  </footer>

  <script>
    if (!new URLSearchParams(window.location.search).has('embed')) {
      document.querySelector('.demo-meta').style.display = 'flex';
      document.querySelector('.demo-logo').style.display = 'block';
    }
  </script>
</body>
</html>
