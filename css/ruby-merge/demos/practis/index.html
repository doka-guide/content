<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Сравнение ruby-merge — ruby-merge — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 30px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .label {
      font-size: 0.9rem;
      color: #979797;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    ruby {
      font-size: 2.8rem;
      ruby-align: center;
    }

    rt {
      color: #FF8630;
      font-size: 1.4rem;
    }

    .separate ruby {
      ruby-merge: separate;
    }

    .merge ruby {
      ruby-merge: merge;
    }

    .auto ruby {
      ruby-merge: auto;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 25px;
      }
      ruby {
        font-size: 2.5rem;
      }
      rt {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="column separate">
      <span class="label">separate</span>
      <ruby>
        上手
        <rt>じょう</rt>
        <rt>ず</rt>
      </ruby>
    </div>

    <div class="column merge">
      <span class="label">merge</span>
      <ruby>
        上手
        <rt>じょう</rt>
        <rt>ず</rt>
      </ruby>
    </div>

    <div class="column auto">
      <span class="label">auto</span>
      <ruby>
        上手
        <rt>じょう</rt>
        <rt>ず</rt>
      </ruby>
    </div>
  </div>
</body>
</html>
