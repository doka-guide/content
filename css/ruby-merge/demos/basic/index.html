<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Объединение аннотаций — ruby-merge — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    ruby {
      font-size: 3rem;
      ruby-align: center;
      ruby-merge: merge;
    }

    rt {
      color: #FF8630;
      font-size: 1.5rem;
    }

    .container {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }
      ruby {
        font-size: 2.5rem;
      }
      rt {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <ruby>
      無常
      <rt>む</rt>
      <rt>じょう</rt>
    </ruby>
  </div>
</body>
</html>
