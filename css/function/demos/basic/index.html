<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Название демо — Title статьи — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    @media (max-width: 768px) {
      body {
        padding: 30px;
      }
    }

    @function --inner-radius(--parent-radius <length>, --offset <length>)
    returns <length> {
      result: max(0px, calc(var(--parent-radius) - var(--offset) ));
    }

    .card {
      --radius: 24px;
      --padding: 8px;

      padding: var(--padding);
      border-radius: var(--radius);
      background: #3949ab;
    }

    .card-content {
      border-radius: --inner-radius(var(--radius), var(--padding));

      background: rgba(255, 255, 255, 0.35);
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-content">Простой внутренний блок</div>
  </div>
</body>
</html>
