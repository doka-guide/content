<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Табличные цифры tnum — font-feature-settings — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @font-face {
      font-family: "LibertinusSerif";
      src: url("../fonts/LibertinusSerif-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 40px 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: sans-serif;
    }

    .demo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 480px;
    }

    .block {
      background-color: #282A2E;
      border-radius: 8px;
      padding: 20px;
    }

    .block-title {
      font-size: 11px;
      color: rgb(255 255 255 / 0.5);
      margin-bottom: 14px;
    }

    .block-title span {
      color: #2E9AFF;
    }

    .numbers {
      font-family: "LibertinusSerif", serif;
      font-size: 22px;
      line-height: 1.7;
      /* выравнивание влево — чтобы разница в ширине цифр была видна */
      text-align: left;
    }

    .pnum {
      font-feature-settings: "pnum";
    }

    .tnum {
      font-feature-settings: "tnum";
    }

    .demo-logo {
      display: none;
      position: fixed;
      top: 12px;
      left: 16px;
      color: #FFFFFF;
      font-size: 13px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .demo-logo:hover { opacity: 1; }

    .demo-meta {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      border-top: 2px solid #2E9AFF;
      background-color: #18191C;
      font-size: 13px;
      font-style: italic;
      justify-content: space-between;
      align-items: center;
    }

    .demo-meta a {
      color: inherit;
      text-decoration-color: #2E9AFF;
      text-decoration-thickness: 2px;
    }

    @media (width <= 768px) {
      body { padding: 24px 20px; }
      .demo { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="demo">
    <div class="block">
      <div class="block-title"><span>"pnum"</span> — пропорциональные</div>
      <div class="numbers pnum">
        1 111 ₽<br>
        4 999 ₽<br>
        1 000 ₽<br>
        9 111 ₽<br>
        11 000 ₽
      </div>
    </div>

    <div class="block">
      <div class="block-title"><span>"tnum"</span> — табличные</div>
      <div class="numbers tnum">
        1 111 ₽<br>
        4 999 ₽<br>
        1 000 ₽<br>
        9 111 ₽<br>
        11 000 ₽
      </div>
    </div>
  </div>

  <a class="demo-logo" href="https://doka.guide/">U•ᴥ•U Дока</a>

  <footer class="demo-meta">
    <a href="https://doka.guide/css/font-feature-settings/">font-feature-settings — Дока</a>
    <a href="https://doka.guide/people/solarrust/">Алёна Батицкая</a>
  </footer>

  <script>
    if (!new URLSearchParams(window.location.search).has('embed')) {
      document.querySelector('.demo-meta').style.display = 'flex';
      document.querySelector('.demo-logo').style.display = 'block';
    }
  </script>
</body>
</html>
