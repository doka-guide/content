<!DOCTYPE html>
<html lang="ru">
<head>
  <title>HWB — Цвета в вебе — Дока</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #18191c;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      max-width: 800px;
      width: 100%;
    }

    #color-wrapper {
      flex: 1 1 300px;
      height: 200px;
      border-radius: 8px;
      overflow: hidden;
      background-image:
        conic-gradient(
          #ffffff33 0deg 90deg,
          #00000033 90deg 180deg,
          #ffffff33 180deg 270deg,
          #00000033 270deg 360deg
        );
      background-size: 20px 20px;
      flex-shrink: 0;
    }

    #color-block {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      border: 1px solid #ffffff33;
      background-color: hwb(0deg 0% 100% / 1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      transition: background-color 0.1s ease;
    }

    #color-block span {
      font-family: 'Roboto Mono', monospace;
      font-size: 1rem;
      text-align: center;
      transition: color 0.2s ease;
      user-select: text;
      word-break: break-all;
    }

    .color-params {
      flex: 1 1 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .input-group label {
      font-size: 0.85rem;
      flex-shrink: 0;
      width: 140px;
      text-align: right;
      color: #aaaaaa;
      font-family: 'Roboto', sans-serif;
    }

    .input-group input[type="range"] {
      flex: 1;
      min-width: 60px;
    }

    .input-group input[type="number"] {
      width: 70px;
      padding: 4px 6px;
      border: 1px solid #ffffff33;
      border-radius: 4px;
      background: transparent;
      color: #ffffff;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.9rem;
      text-align: center;
      transition: border-color 0.2s;
    }

    .input-group input[type="number"]:focus {
      border-color: #2E9AFF;
      outline: none;
    }

    .input-group input[type="number"]::-webkit-inner-spin-button,
    .input-group input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .demo-logo {
      display: none;
      position: fixed;
      top: 12px;
      left: 16px;
      color: #FFFFFF;
      font-size: 13px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .demo-logo:hover {
      opacity: 1;
    }

    .demo-meta {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      border-top: 2px solid #2E9AFF;
      background-color: #18191C;
      font-size: 13px;
      font-style: italic;
      justify-content: space-between;
      align-items: center;
    }

    .demo-meta a {
      color: inherit;
      text-decoration-color: #2E9AFF;
      text-decoration-thickness: 2px;
    }

    /* На узких экранах круг не помещается по ширине, поэтому
      превращаем его в скруглённую карточку с тем же цветным кантом */
    @media (width <= 680px) {
      body {
        padding: 15px;
      }

      .container {
        gap: 20px;
      }

      #color-wrapper {
        flex: 1 1 100%;
        height: 150px;
      }

      .color-params {
        flex: 1 1 100%;
        gap: 12px;
      }

      .input-group {
        flex-wrap: wrap;
        gap: 6px 12px;
      }

      .input-group label {
        width: 100%;
        text-align: left;
        font-size: 0.8rem;
      }

      .input-group input[type="number"] {
        width: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="color-wrapper">
      <div id="color-block">
        <span>hwb(0deg 0% 100% / 1)</span>
      </div>
    </div>
    <div class="color-params">
      <div class="input-group">
        <label for="h">H (оттенок):</label>
        <input type="range" id="h" min="0" max="360" value="0" />
        <input type="number" id="h-num" min="0" max="360" value="0" />
      </div>
      <div class="input-group">
        <label for="w">W (количество белого):</label>
        <input type="range" id="w" min="0" max="100" value="0" />
        <input type="number" id="w-num" min="0" max="100" value="0" />
      </div>
      <div class="input-group">
        <label for="b">B (количество чёрного):</label>
        <input type="range" id="b" min="0" max="100" value="100" />
        <input type="number" id="b-num" min="0" max="100" value="100" />
      </div>
      <div class="input-group">
        <label for="a">α (альфа-канал):</label>
        <input type="range" id="a" min="0" max="1" step="0.01" value="1" />
        <input type="number" id="a-num" min="0" max="1" step="0.01" value="1" />
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const refs = {
        h: document.getElementById('h'),
        w: document.getElementById('w'),
        b: document.getElementById('b'),
        a: document.getElementById('a'),
        hNum: document.getElementById('h-num'),
        wNum: document.getElementById('w-num'),
        bNum: document.getElementById('b-num'),
        aNum: document.getElementById('a-num'),
        block: document.getElementById('color-block'),
        text: document.querySelector('#color-block span')
      };

      function getContrastColor(rgbString) {
        const match = rgbString.match(/\d+/g);
        if (!match) return '#ffffff';

        const [r, g, b] = match.map(Number);

        const srgb = [r, g, b].map(function(value) {
          value /= 255;
          return value <= 0.03928
            ? value / 12.92
            : Math.pow((value + 0.055) / 1.055, 2.4);
        });

        const luminance = 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];

        return luminance > 0.179 ? '#000000' : '#ffffff';
      }

      function updateColor() {
        const h = refs.h.value;
        const w = refs.w.value;
        const b = refs.b.value;
        const a = refs.a.value;

        const cssColor = 'hwb(' + h + 'deg ' + w + '% ' + b + '% / ' + a + ')';

        refs.block.style.backgroundColor = cssColor;
        refs.text.textContent = cssColor;

        const appliedRGB = getComputedStyle(refs.block).backgroundColor;
        refs.text.style.color = getContrastColor(appliedRGB);
      }

      function syncFromSliders() {
        refs.hNum.value = refs.h.value;
        refs.wNum.value = refs.w.value;
        refs.bNum.value = refs.b.value;
        refs.aNum.value = refs.a.value;
        updateColor();
      }

      function syncFromNumbers() {
        refs.h.value = refs.hNum.value;
        refs.w.value = refs.wNum.value;
        refs.b.value = refs.bNum.value;
        refs.a.value = refs.aNum.value;
        updateColor();
      }

      refs.h.addEventListener('input', syncFromSliders);
      refs.w.addEventListener('input', syncFromSliders);
      refs.b.addEventListener('input', syncFromSliders);
      refs.a.addEventListener('input', syncFromSliders);

      refs.hNum.addEventListener('input', syncFromNumbers);
      refs.wNum.addEventListener('input', syncFromNumbers);
      refs.bNum.addEventListener('input', syncFromNumbers);
      refs.aNum.addEventListener('input', syncFromNumbers);

      updateColor();
    })();
  </script>
</body>
</html>
