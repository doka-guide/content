<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Три режима переноса слов — hyphens — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #18191C;
      color: #FFFFFF;
      font-family: "Roboto", sans-serif;
    }

    .demo {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .col {
      width: 130px;
    }

    .col-title {
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #2E9AFF;
    }

    .col-text {
      padding: 16px;
      background-color: #282A2E;
      font-size: 15px;
      line-height: 1.5;
    }

    .none   { hyphens: none; }
    .manual { hyphens: manual; }
    .auto   { hyphens: auto; }

    .demo-meta {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      border-top: 2px solid #2E9AFF;
      background-color: #18191C;
      font-size: 13px;
      font-style: italic;
      justify-content: space-between;
      align-items: center;
    }

    .demo-meta a {
      color: inherit;
      text-decoration-color: #2E9AFF;
      text-decoration-thickness: 2px;
    }

    @media (width <= 768px) {
      body {
        padding: 30px;
      }

      .demo {
        flex-direction: column;
        gap: 30px;
      }

      .col {
        width: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="demo">
    <div class="col">
      <p class="col-title"><code>none</code></p>
      <!-- Текст без &shy;: слово не переносится, выходит за границу блока -->
      <p class="col-text none" lang="ru">Высококвалифицированный специалист.</p>
    </div>
    <div class="col">
      <p class="col-title"><code>manual</code></p>
      <!-- Текст с &shy;: перенос только в указанных местах -->
      <p class="col-text manual" lang="ru">Вы&shy;со&shy;ко&shy;ква&shy;ли&shy;фи&shy;ци&shy;ро&shy;ван&shy;ный спе&shy;ци&shy;а&shy;лист.</p>
    </div>
    <div class="col">
      <p class="col-title"><code>auto</code></p>
      <!-- Тот же текст без &shy;: браузер сам расставляет переносы -->
      <p class="col-text auto" lang="ru">Высококвалифицированный специалист.</p>
    </div>
  </div>

  <footer class="demo-meta">
    <a href="https://doka.guide/css/hyphens/">hyphens — Дока</a>
    <a href="https://doka.guide/people/solarrust/">solarrust</a>
  </footer>

  <script>
    if (!new URLSearchParams(window.location.search).has('embed')) {
      document.querySelector('.demo-meta').style.display = 'flex';
    }
  </script>
</body>
</html>
