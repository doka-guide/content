<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Пример паттерна "Логин" — Атрибут `pattern` — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <form class="form" action="javascript:alert('Всё верно!');">
    <div class="form-row">
      <label for="login" class="row-label">Введите логин:</label>
      <input id="login" class="input" type="text" pattern="[-a-zA-Z0-9_]{3,20}" title="От 3 до 20 символов, разрешены латинские буквы, цифры, -, _">
    </div>
    <button class="button button-orange" type="submit">Сохранить</button>
  </form>
</body>
</html>
