<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Пример паттерна "IP-адрес" — Атрибут `pattern` — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <form class="form" action="javascript:alert('Всё верно!');">
    <div class="form-row">
      <label for="ip" class="row-label">Введите IP-адрес:</label>
      <input id="ip" class="input" type="text" pattern="(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)){3}" title="Каждое число должно находиться в диапазоне от 0 до 255">
    </div>
    <button class="button button-orange" type="submit">Сохранить</button>
  </form>
</body>
</html>
