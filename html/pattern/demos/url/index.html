<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Пример паттерна "URL" — Атрибут `pattern` — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <form class="form" action="javascript:alert('Всё верно!');">
    <div class="form-row">
      <label for="url" class="row-label">Введите url:</label>
      <input id="url" class="input" type="text" pattern="https?://[a-zA-Z0-9]+[a-zA-Z0-9.\-]*\.[a-zA-Z]{2,}" title="Адрес должен начинаться с http:// или https:// и содержать домен">
    </div>
    <button class="button button-orange" type="submit">Сохранить</button>
  </form>
</body>
</html>
