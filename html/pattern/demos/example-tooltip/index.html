<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Пример всплывающей подсказки — Атрибут `pattern` — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <form class="form" action="javascript:alert('Всё верно!');">
    <div class="form-row">
      <label for="pass" class="row-label">Пароль:</label>
      <input id="pass" class="input" type="password" pattern=".{6,}" title="Минимум 6 символов">
    </div>
    <button class="button button-orange" type="submit">Сохранить</button>
  </form>
</body>
</html>
