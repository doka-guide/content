<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Пример паттерна "Дата" — Атрибут `pattern` — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <form class="form" action="javascript:alert('Всё верно!');">
    <div class="form-row">
      <label for="date" class="row-label">Введите дату:</label>
      <input
        id="date"
        class="input"
        type="text"
        pattern="(0[1-9]|[12][0-9]|3[01])\.(0[1-9]|1[0-2])\.(19|20)[0-9]{2}"
        title="Введите дату в формате ДД.ММ.ГГГГ"
        required
      >
    </div>
    <button class="button button-orange" type="submit">Сохранить</button>
  </form>
</body>
</html>
