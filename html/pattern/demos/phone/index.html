<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Пример паттерна "Номер телефона" — Атрибут `pattern` — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <form class="form" action="javascript:alert('Всё верно!');">
    <div class="form-row">
      <label for="phone" class="row-label">Введите номер телефона:</label>
      <input
        id="phone"
        class="input"
        type="tel"
        pattern="\+\d{8,15}"
        title="Номер должен начинаться с + и содержать о 8 до 15 цифр"
        required
      >
    </div>
    <button class="button button-orange" type="submit">Сохранить</button>
  </form>
</body>
</html>
