<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Пример паттерна "Имя" — Атрибут `pattern` — Дока</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <form class="form" action="javascript:alert('Всё верно!');">
    <div class="form-row">
      <label for="name" class="row-label">Введите имя:</label>
      <input
        id="name"
        class="input"
        type="text"
        pattern="[А-ЯЁ][а-яё]+(-[А-ЯЁ][а-яё]+)?"
        title="Введите имя с большой буквы"
        required
      >
    </div>
    <button class="button button-orange" type="submit">Сохранить</button>
  </form>
</body>
</html>
